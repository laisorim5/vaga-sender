<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: sans-serif;
      background: #fff;
    }

    h3 {
      margin: 0 0 12px;
      color: #1a1a1a;
    }

    label {
      font-size: 12px;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }

    textarea, input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
      margin-bottom: 10px;
      resize: vertical;
    }

    .imagem-preview {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 10px;
      display: none; /* esconde se não tiver imagem */
    }

    .botoes {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #25D366;
      color: white;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover { background: #1da851; }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: gray;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>📤 Vaga Sender</h3>

  <label>📝 Texto da vaga</label>
  <textarea id="texto" rows="4"></textarea>

  <label>🔗 Link</label>
  <input type="text" id="link" />

  <label>🖼️ Imagem</label>
  <img id="preview" class="imagem-preview" />

  <label>Enviar para:</label>
  <div class="botoes">
    <button onclick="enviar('estagio')">📢 Estágio</button>
    <button onclick="enviar('dados')">📊 Dados</button>
    <button onclick="enviar('tech')">💻 Tech</button>
  </div>

  <div id="status"></div>

  <script>
    // Quando o popup abre, carrega os dados capturados pelo background.js
    chrome.storage.local.get("vagaPendente", (result) => {
      const vaga = result.vagaPendente;
      if (!vaga) return;

      document.getElementById("texto").value = vaga.texto || "";
      document.getElementById("link").value = vaga.link || "";

      // Só mostra a imagem se tiver uma
      if (vaga.imagemUrl) {
        const preview = document.getElementById("preview");
        preview.src = vaga.imagemUrl;
        preview.style.display = "block";
      }
    });

    function enviar(destino) {
      const texto = document.getElementById("texto").value;
      const link = document.getElementById("link").value;
      const imagemUrl = document.getElementById("preview").src;

      document.getElementById("status").innerText = "Enviando...";

      fetch("http://localhost:5000/enviar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ texto, link, imagemUrl, destino })
      })
      .then(r => r.json())
      .then(() => {
        document.getElementById("status").innerText = "✅ Enviado!";
        // Limpa o storage depois de enviar
        chrome.storage.local.remove("vagaPendente");
      })
      .catch(() => {
        document.getElementById("status").innerText = "❌ Erro. Backend rodando?";
      });
    }
  </script>
</body>
</html>
